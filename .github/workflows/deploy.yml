name: deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'container/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Pattern A (per Mouriya-Emma/local-cicd-demo §Deployment patterns):
# build on a github-hosted runner, deploy on the netbird-mesh runner.
# The deploy step rsyncs dist/ + container/ to deploy@nanoclaw.mouriya.lan
# then `sudo systemctl restart nanoclaw` and a smoke check.
#
# Secrets needed (configured in this repo's settings):
#   DEPLOY_SSH_KEY   - private ed25519 key whose public counterpart is
#                      authorized for the deploy user on VM 106 (managed by
#                      homelab-tf _shared/ansible/secrets.yml :
#                      nanoclaw_deploy_ssh_pubkey).

# Only one deploy can be in flight at a time. Newer pushes wait for the
# active deploy to finish; the queue collapses if multiple lands during
# a long deploy.
concurrency:
  group: nanoclaw-deploy
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'Mouriya-Emma/nanoclaw'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # `npm install` (not `npm ci`) — package-lock.json on this fork is
      # currently out of sync with package.json (the operator had a WIP
      # `npm install` mid-flight when the deploy workflow landed). Issue
      # to track resyncing the lockfile lives in this repo. Once the
      # lockfile is back in sync, switch this back to `npm ci` and add
      # `cache: npm` to the setup-node step.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
      - uses: actions/upload-artifact@v4
        with:
          name: container
          path: container/
          retention-days: 1
      # Ship the manifest pair too so the deploy step can install runtime
      # deps on the target (`npm install --omit=dev`). Compiling native
      # modules against the build runner's glibc and shipping node_modules
      # works for prebuilt packages but breaks for anything that needs to
      # compile, so we trade slower deploy for reliability.
      - uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: |
            package.json
            package-lock.json
          retention-days: 1

  deploy:
    needs: build
    runs-on: [self-hosted, linux, vctcn]
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: container
          path: container/

      - uses: actions/download-artifact@v4
        with:
          name: manifest
          path: ./

      - name: Stage SSH key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          TARGET: nanoclaw.mouriya.lan
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Trust-on-first-use is acceptable here: target is reachable
          # only via netbird, and ssh-keyscan runs from the netbird side.
          ssh-keyscan -H "$TARGET" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync dist + container + manifest to /opt/nanoclaw
        env:
          TARGET: nanoclaw.mouriya.lan
        run: |
          rsync -az --delete \
            -e 'ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes' \
            dist/ "deploy@${TARGET}:/opt/nanoclaw/dist/"
          rsync -az --delete \
            -e 'ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes' \
            container/ "deploy@${TARGET}:/opt/nanoclaw/container/"
          rsync -az \
            -e 'ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes' \
            package.json package-lock.json \
            "deploy@${TARGET}:/opt/nanoclaw/"

      - name: Install runtime deps on target
        env:
          TARGET: nanoclaw.mouriya.lan
        run: |
          # `npm install` (not `ci`) because the lockfile is currently
          # out of sync with package.json — see the build step's comment.
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes "deploy@${TARGET}" \
            'cd /opt/nanoclaw && npm install --omit=dev --no-audit --no-fund'

      - name: Restart + smoke
        env:
          TARGET: nanoclaw.mouriya.lan
        run: |
          # Boot can take longer than 3 s on first run because better-sqlite3
          # opens the on-disk db and the mattermost/telegram channels run
          # their initial WebSocket handshakes; allow up to ~30 s for the
          # service to settle into `active` before failing the deploy.
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes "deploy@${TARGET}" \
            'sudo systemctl restart nanoclaw && for i in $(seq 1 15); do
               sleep 2
               state=$(sudo systemctl is-active nanoclaw || true)
               if [ "$state" = "active" ]; then echo "active after ${i}*2s"; exit 0; fi
             done
             echo "service did not become active in 30s; last state: $state" >&2
             sudo systemctl status nanoclaw --no-pager | head -25 >&2
             exit 1'

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
